kind = "web"
previewPath = "/"
title = "Sindiconnection"
version = "1.0.0"
id = "artifacts/sindiconnection"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20419

[services.development]
run = "pnpm --filter @workspace/sindiconnection run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sindiconnection", "run", "build" ]
publicDir = "artifacts/sindiconnection/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20419"
BASE_PATH = "/"
